name : backend

on:
  push:
    branches:
     - main
  # 勉強用
  # GitHub Actionsは時間で課金されるため無効化しておく
  # schedule:
  #    - cron: '0 12 * * *' # 日本時間で毎日21時に実行されるように設定

defaults:
  run:
    working-directory: backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout and Setup'
        uses: actions/checkout@v7 # Checkout the repository

      - name: 'Setup Node.js'
        uses: actions/setup-node@v6 # Setup Node.js
        with:
          node-version: 24 # Specify the Node.js version

      - name: 'Install Dependencies and Run Tests'
        run: |
          # Install dependencies, run tests with coverage, and build the project
          npm ci # Install dependencies
          npm run test -- --coverage # Run tests with coverage
          npm run build # Build the project

          # Run the built project and API tests
          node dist/index.js & # Run the built project in the background
          npx wait-on -t 10000 http://localhost:8080/api/health # Wait for the server to be ready
          npm run test:api # Run API tests

      - name: 'Upload Coverage Artifact'
        uses: actions/upload-artifact@v7
        if : always() # Ensure this step runs even if previous steps fail
        with:
          name: coverage
          path: backend/coverage/**
          retention-days: 5

      - name: 'Upload dist Artifact'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: backend/dist/index.js
          retention-days: 5
